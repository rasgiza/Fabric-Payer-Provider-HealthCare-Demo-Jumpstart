id: 0  # Maintainers will assign the final numeric id during PR review
logical_id: payer-provider-healthcare
name: Payer/Provider Healthcare Demo
description: >-
  An end-to-end Microsoft Fabric solution for healthcare payers and providers.
  Combines a medallion lakehouse (Bronze/Silver/Gold), Power BI Direct Lake
  reporting, an HLS Data Agent grounded on a star-schema semantic model and
  curated knowledge documents, and an opt-in Real-Time Intelligence stack
  (Eventhouse + KQL Database + KQL Dashboard) for fraud detection, care-gap
  closure, and high-cost-member trajectory scoring. One launcher notebook
  generates synthetic data, runs the ETL pipeline, deploys the report and the
  agent, and bootstraps the RTI hot path.
