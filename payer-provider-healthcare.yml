logical_id: payer-provider-healthcare
name: Payer/Provider Healthcare Demo
description: >-
  End-to-end healthcare payer/provider analytics on Fabric. A launcher
  notebook deploys a medallion lakehouse, ETL pipelines, a Direct Lake
  Power BI report, an HLS Data Agent grounded on the star-schema model,
  and an opt-in Real-Time Intelligence stack (Eventhouse + KQL DB) for
  fraud, care-gap, and high-cost-member scoring on synthetic data.
