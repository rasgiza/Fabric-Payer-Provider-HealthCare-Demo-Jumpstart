<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Time Bomb in Your Panel — Sarah Johnson</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --fabric:#0078D4;--iq:#00B7C3;--foundry:#8661C5;--rti:#FFB900;
  --success:#107C10;--danger:#D13438;--bg:#06060C;--bg2:#0C0C14;
  --text:#FFFFFF;--muted:#6E7090;--glass:rgba(8,8,16,.88);
  --critical:#FF1744;--opioid:#E53935;--benzo:#FF6D00;
}
html,body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100%;width:100%}
canvas{display:block;position:fixed;top:0;left:0;z-index:0}
.cine{position:fixed;left:0;width:100%;height:48px;background:linear-gradient(180deg,#000 60%,transparent);z-index:5}
.cine.top{top:0}.cine.bot{bottom:0;background:linear-gradient(0deg,#000 60%,transparent)}
#title-block{position:fixed;top:70px;left:48px;z-index:12;max-width:520px;opacity:0;transform:translateY(-16px);transition:all .7s cubic-bezier(.22,1,.36,1)}
#title-block.visible{opacity:1;transform:translateY(0)}
#title-block h1{font-size:1.65rem;font-weight:800;line-height:1.28;letter-spacing:-.03em}
#title-block h1 .hl-iq{color:var(--iq)}#title-block h1 .hl-foundry{color:var(--foundry)}
#title-block h1 .hl-rti{color:var(--rti)}#title-block h1 .hl-danger{color:var(--danger)}
#title-block h1 .hl-success{color:var(--success)}#title-block h1 .hl-fabric{color:var(--fabric)}
#title-block h1 .hl-critical{color:var(--critical)}
#title-block p{font-size:.78rem;color:var(--muted);margin-top:7px;line-height:1.65;max-width:440px}
#cards{position:fixed;inset:0;pointer-events:none;z-index:11}
.card-left{position:absolute;left:48px;pointer-events:auto;background:var(--glass);
  border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px 20px;
  backdrop-filter:blur(24px) saturate(1.4);box-shadow:0 12px 48px rgba(0,0,0,.7);
  opacity:0;transform:translateX(-20px);transition:all .6s cubic-bezier(.22,1,.36,1);
  max-width:400px;width:380px}
.card-left.visible{opacity:1;transform:translateX(0)}
.card-right{position:absolute;right:48px;pointer-events:auto;background:var(--glass);
  border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px 20px;
  backdrop-filter:blur(24px) saturate(1.4);box-shadow:0 12px 48px rgba(0,0,0,.7);
  opacity:0;transform:translateX(20px);transition:all .6s cubic-bezier(.22,1,.36,1);
  max-width:400px;width:380px}
.card-right.visible{opacity:1;transform:translateX(0)}
.card-center{position:absolute;left:50%;transform:translateX(-50%) translateY(20px);
  pointer-events:auto;background:var(--glass);
  border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px 28px;
  backdrop-filter:blur(24px) saturate(1.4);box-shadow:0 16px 64px rgba(0,0,0,.8);
  opacity:0;transition:all .7s cubic-bezier(.22,1,.36,1);max-width:560px;text-align:center}
.card-center.visible{opacity:1;transform:translateX(-50%) translateY(0)}
.card-left h3,.card-right h3,.card-center h3{font-size:.68rem;font-weight:700;margin-bottom:7px;text-transform:uppercase;letter-spacing:1.8px}
.card-left p,.card-right p,.card-center p{font-size:.74rem;color:var(--muted);line-height:1.65}
.big{font-size:2rem;font-weight:900;margin:3px 0}
.big.danger{color:var(--danger)}.big.success{color:var(--success)}.big.iq{color:var(--iq)}
.big.rti{color:var(--rti)}.big.fabric{color:var(--fabric)}.big.critical{color:var(--critical)}
table{width:100%;border-collapse:collapse;margin-top:8px;font-size:.66rem}
table th{text-align:left;color:var(--iq);border-bottom:1px solid rgba(255,255,255,.06);padding:4px 7px;font-weight:700}
table td{padding:4px 7px;color:var(--muted)}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.56rem;font-weight:700;margin:2px;white-space:nowrap}
.pill-red{background:rgba(209,52,56,.1);color:var(--danger);border:1px solid rgba(209,52,56,.2)}
.pill-green{background:rgba(16,124,16,.1);color:var(--success);border:1px solid rgba(16,124,16,.2)}
.pill-yellow{background:rgba(255,185,0,.1);color:var(--rti);border:1px solid rgba(255,185,0,.2)}
.pill-blue{background:rgba(0,120,212,.1);color:var(--fabric);border:1px solid rgba(0,120,212,.2)}
.pill-purple{background:rgba(134,97,197,.1);color:var(--foundry);border:1px solid rgba(134,97,197,.2)}
.pill-teal{background:rgba(0,183,195,.1);color:var(--iq);border:1px solid rgba(0,183,195,.2)}
.pill-critical{background:rgba(255,23,68,.12);color:var(--critical);border:1px solid rgba(255,23,68,.25)}
.clickable{cursor:pointer;transition:border-color .2s, box-shadow .2s}
.clickable:hover{border-color:rgba(255,255,255,.15);box-shadow:0 16px 56px rgba(0,0,0,.8)}
.click-expand{display:none;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.05)}
.clickable.expanded .click-expand{display:block}
.click-hint{font-size:.56rem;color:rgba(255,255,255,.2);margin-top:6px;font-style:italic}
.badge{display:inline-flex;align-items:center;padding:3px 12px;border-radius:20px;font-size:.62rem;font-weight:700;letter-spacing:.4px}
.badge-day1{background:rgba(209,52,56,.1);color:var(--danger);border:1px solid rgba(209,52,56,.18)}
.badge-day2{background:rgba(255,185,0,.1);color:var(--rti);border:1px solid rgba(255,185,0,.18)}
.badge-day3{background:rgba(0,120,212,.1);color:var(--fabric);border:1px solid rgba(0,120,212,.18)}
.badge-day28{background:rgba(16,124,16,.1);color:var(--success);border:1px solid rgba(16,124,16,.18)}
.badge-critical{background:rgba(255,23,68,.12);color:var(--critical);border:1px solid rgba(255,23,68,.22)}
.badge-fda{background:rgba(255,23,68,.15);color:#FF1744;border:1px solid rgba(255,23,68,.3);font-weight:900;letter-spacing:1px}
.edge{font-size:.58rem;color:var(--iq);font-family:'Inter',monospace;padding:1px 5px;background:rgba(0,183,195,.06);border-radius:3px}
.teams-notif{background:rgba(6,6,12,.97);border-left:3px solid var(--critical);border-radius:11px;padding:14px 16px;box-shadow:0 0 32px rgba(255,23,68,.08)}
.teams-notif h4{font-size:.72rem;color:var(--critical);margin-bottom:6px;font-weight:700}
.teams-notif .body{font-size:.68rem;color:var(--muted);line-height:1.7}
.teams-notif .actions{display:flex;gap:7px;margin-top:12px}
.teams-notif .btn-go{background:var(--critical);color:#fff;border:none;padding:6px 14px;border-radius:7px;font-size:.68rem;cursor:pointer;font-weight:700;font-family:inherit}
.teams-notif .btn-skip{background:rgba(255,255,255,.04);color:var(--muted);border:1px solid rgba(255,255,255,.06);padding:6px 14px;border-radius:7px;font-size:.68rem;cursor:pointer;font-family:inherit}
#nav{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:20}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.1);cursor:pointer;transition:all .4s}
.dot:hover{background:rgba(255,255,255,.25)}
.dot.active{width:26px;border-radius:3px;background:var(--fabric)}
#scene-lbl{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);font-size:.55rem;color:rgba(255,255,255,.15);z-index:20;letter-spacing:3px;text-transform:uppercase}
#ctrl{position:fixed;top:16px;right:16px;display:flex;gap:5px;z-index:20}
.cb{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);color:rgba(255,255,255,.3);padding:4px 11px;border-radius:5px;font-size:.58rem;cursor:pointer;font-family:inherit;transition:all .2s}
.cb:hover{background:rgba(255,255,255,.07);color:#fff}.cb.on{background:var(--fabric);border-color:var(--fabric);color:#fff}
#loader{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 1.2s}
#loader.done{opacity:0;pointer-events:none}
#loader .mark{width:52px;height:52px;border:1.5px solid rgba(255,255,255,.06);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:16px}
#loader .mark .x{color:#fff;font-size:1.3rem;font-weight:200}
#loader h1{font-size:.9rem;font-weight:300;letter-spacing:4px;text-transform:uppercase}
#loader p{font-size:.62rem;color:var(--muted);margin-top:4px}
.bar{width:120px;height:1.5px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden;margin-top:20px}
.bar div{height:100%;width:0%;background:linear-gradient(90deg,var(--critical),var(--rti),var(--foundry));border-radius:2px;transition:width .12s}
</style>
</head>
<body>
<div id="loader">
  <div class="mark"><span class="x">+</span></div>
  <h1>Lakeside Health</h1>
  <p>Sarah Johnson — The Time Bomb in Your Panel</p>
  <div class="bar"><div id="bar-fill"></div></div>
</div>
<div class="cine top"></div>
<div class="cine bot"></div>
<div id="title-block"><h1></h1><p></p></div>
<div id="cards"></div>
<div id="nav"></div>
<div id="scene-lbl"></div>
<div id="ctrl"><button class="cb" id="btn-auto">Auto</button></div>
<script>
window.onerror=function(msg,src,line,col,err){
  var d=document.getElementById('loader');
  var stack=err&&err.stack?'<pre style="color:#AA8800;margin-top:12px;font-size:11px;white-space:pre-wrap;max-height:300px;overflow:auto">'+err.stack+'</pre>':'';
  if(d){d.innerHTML='<div style="color:#FF4444;padding:40px;text-align:left;max-width:700px;font-family:monospace;font-size:13px"><h2 style="color:#FF4444;margin-bottom:12px">Error</h2><p>'+msg+'</p><p style="color:#888;margin-top:8px">Source: '+(src||'?')+' line '+line+':'+col+'</p>'+stack+'</div>';d.style.display='flex'}
  return true;
};
</script>
<script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/three@0.138.0/build/three.min.js"></script>
<script>if(typeof THREE==='undefined'){document.getElementById('loader').innerHTML='<p style="color:red;padding:40px">Failed to load Three.js</p>';throw new Error('THREE missing')}</script>
<script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/three@0.138.0/examples/js/controls/OrbitControls.js"></script>
<script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/three@0.138.0/examples/js/shaders/CopyShader.js"></script>
<script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/three@0.138.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/three@0.138.0/examples/js/postprocessing/EffectComposer.js"></script>
<script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/three@0.138.0/examples/js/postprocessing/ShaderPass.js"></script>
<script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/three@0.138.0/examples/js/postprocessing/RenderPass.js"></script>
<script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/three@0.138.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script>
(function(){
  var m=[];
  if(typeof THREE==='undefined')m.push('THREE');
  else{if(!THREE.OrbitControls)m.push('OrbitControls');if(!THREE.EffectComposer)m.push('EffectComposer');if(!THREE.RenderPass)m.push('RenderPass');if(!THREE.UnrealBloomPass)m.push('UnrealBloomPass');if(!THREE.ShaderPass)m.push('ShaderPass');if(!THREE.CopyShader)m.push('CopyShader')}
  if(typeof gsap==='undefined')m.push('GSAP');
  if(m.length){document.getElementById('loader').innerHTML='<p style="color:red;padding:40px;font-family:monospace">Missing: '+m.join(', ')+'</p>';throw new Error('Missing deps')}
})();
</script>
<script>
try {

const P={fabric:0x0078D4,iq:0x00B7C3,foundry:0x8661C5,rti:0xFFB900,ok:0x107C10,bad:0xD13438,bg:0x06060C,critical:0xFF1744,opioid:0xE53935,benzo:0xFF6D00};
const W=innerWidth,H=innerHeight;

/* ═══════ RENDERER ═══════ */
const R=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
R.setSize(W,H);R.setPixelRatio(Math.min(devicePixelRatio,2));
R.shadowMap.enabled=true;R.shadowMap.type=THREE.PCFSoftShadowMap;
R.toneMapping=THREE.ACESFilmicToneMapping;R.toneMappingExposure=.95;
R.outputEncoding=THREE.sRGBEncoding;
document.body.prepend(R.domElement);
const scene=new THREE.Scene();scene.background=new THREE.Color(P.bg);
scene.fog=new THREE.FogExp2(P.bg,.006);
const cam=new THREE.PerspectiveCamera(42,W/H,.1,800);cam.position.set(0,8,30);
const ctrl=new THREE.OrbitControls(cam,R.domElement);
ctrl.enableDamping=true;ctrl.dampingFactor=.06;ctrl.enablePan=false;
ctrl.maxPolarAngle=Math.PI*.78;ctrl.minDistance=8;ctrl.maxDistance=60;
ctrl.autoRotate=true;ctrl.autoRotateSpeed=.08;
const comp=new THREE.EffectComposer(R);comp.addPass(new THREE.RenderPass(scene,cam));
const bloom=new THREE.UnrealBloomPass(new THREE.Vector2(W,H),.3,.6,.9);comp.addPass(bloom);

/* ═══════ STARFIELD ═══════ */
(function(){
  const n=2500,pos=new Float32Array(n*3);
  for(let i=0;i<n;i++){const r=120+Math.random()*400,th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);
    pos[i*3]=r*Math.sin(ph)*Math.cos(th);pos[i*3+1]=r*Math.sin(ph)*Math.sin(th);pos[i*3+2]=r*Math.cos(ph)}
  const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0x5566AA,size:.2,transparent:true,opacity:.45,sizeAttenuation:true})));
})();

/* ═══════ LIGHTING ═══════ */
scene.add(new THREE.AmbientLight(0x252540,.6));
const sun=new THREE.DirectionalLight(0xFFEEDD,.85);sun.position.set(15,25,12);sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);sun.shadow.camera.left=-40;sun.shadow.camera.right=40;
sun.shadow.camera.top=40;sun.shadow.camera.bottom=-40;scene.add(sun);
scene.add(new THREE.DirectionalLight(0x3355AA,.2).translateX(-12).translateY(8));
scene.add(new THREE.PointLight(0x5577AA,.2,50).translateY(12).translateZ(-15));

/* ═══════ MATERIALS ═══════ */
const matWall=new THREE.MeshStandardMaterial({color:0x2A3550,roughness:.85,metalness:.05});
const matWallL=new THREE.MeshStandardMaterial({color:0x354060,roughness:.8,metalness:.05});
const matGlass=new THREE.MeshPhysicalMaterial({color:0x88BBEE,roughness:.05,metalness:.1,transmission:.6,thickness:.3,transparent:true,opacity:.55});
const matWinGlow=new THREE.MeshStandardMaterial({color:0x88CCFF,emissive:0x88CCFF,emissiveIntensity:.6,transparent:true,opacity:.7});
const matRoof=new THREE.MeshStandardMaterial({color:0x1E2838,roughness:.9,metalness:.1});
const matConc=new THREE.MeshStandardMaterial({color:0x3A3A4A,roughness:.95,metalness:.02});
const matRedX=new THREE.MeshStandardMaterial({color:0xFF3333,emissive:0xFF3333,emissiveIntensity:.5});
const matRoad=new THREE.MeshStandardMaterial({color:0x1A1A24,roughness:.95,metalness:.02});
const matLane=new THREE.MeshStandardMaterial({color:0x555550,roughness:.9});

/* ═══════ GEOMETRY HELPERS ═══════ */
const bx=(w,h,d,m)=>{const o=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);o.castShadow=true;o.receiveShadow=true;return o};
const cy=(rt,rb,h,m,s=32)=>{const o=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,s),m);o.castShadow=true;return o};
const sp=(r,m,s=32)=>new THREE.Mesh(new THREE.SphereGeometry(r,s,s),m);

function glow(r,color,intensity){
  intensity=intensity||.5;
  const m=new THREE.MeshStandardMaterial({color,emissive:color,emissiveIntensity:intensity,roughness:.15,metalness:.1,transparent:true,opacity:.92});
  const o=new THREE.Mesh(new THREE.SphereGeometry(r,32,32),m);
  o.add(new THREE.Mesh(new THREE.SphereGeometry(r*1.6,16,16),new THREE.MeshBasicMaterial({color,transparent:true,opacity:.04})));
  o.add(new THREE.Mesh(new THREE.SphereGeometry(r*2.5,12,12),new THREE.MeshBasicMaterial({color,transparent:true,opacity:.015})));
  return o;
}
function orbitRing(r,color){
  return new THREE.Mesh(new THREE.RingGeometry(r-.02,r+.02,96),new THREE.MeshBasicMaterial({color,transparent:true,opacity:.12,side:THREE.DoubleSide}));
}
function txt(text,opts){
  opts=opts||{};var size=opts.size||40,weight=opts.weight||'600',color=opts.color||'#fff',scale=opts.scale||1;
  const c=document.createElement('canvas'),x=c.getContext('2d');
  x.font=weight+' '+size+'px Inter,sans-serif';
  const tw=x.measureText(text).width+16,th=size*1.5;
  c.width=tw*2;c.height=th*2;x.scale(2,2);
  x.font=weight+' '+size+'px Inter,sans-serif';x.fillStyle=color;x.textBaseline='middle';
  x.fillText(text,8,th/2);
  const t=new THREE.CanvasTexture(c);t.minFilter=THREE.LinearFilter;
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:t,transparent:true,depthTest:false}));
  s.scale.set(tw/70*scale,th/70*scale,1);return s;
}
function lnPts(pts,color,op){
  return new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color,transparent:true,opacity:op||.5}));
}
function particles(n,spread,color,sz){
  const pos=new Float32Array(n*3),vel=new Float32Array(n*3);
  for(let i=0;i<n;i++){for(let j=0;j<3;j++){pos[i*3+j]=(Math.random()-.5)*spread;vel[i*3+j]=(Math.random()-.5)*.01}}
  const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(pos,3));g.userData={vel:vel};
  return new THREE.Points(g,new THREE.PointsMaterial({color,size:sz||.04,transparent:true,opacity:.4,sizeAttenuation:true,blending:THREE.AdditiveBlending}));
}
function tickP(pts){var p=pts.geometry.attributes.position,v=pts.geometry.userData.vel;for(var i=0;i<p.count;i++){p.array[i*3]+=v[i*3];p.array[i*3+1]+=v[i*3+1];p.array[i*3+2]+=v[i*3+2];for(var j=0;j<3;j++)if(Math.abs(p.array[i*3+j])>14)p.array[i*3+j]*=-.3}p.needsUpdate=true}

function createStreamDots(group,count,color,intensity){
  var dots=[];
  for(var i=0;i<count;i++){
    var d=glow(.04,color,intensity||1.5);d.visible=false;group.add(d);
    dots.push({mesh:d,t:Math.random(),speed:.15+Math.random()*.12});
  }
  return dots;
}
function animStream(dots,pathPts,dt){
  for(var k=0;k<dots.length;k++){
    var fd=dots[k];fd.t+=dt*fd.speed;if(fd.t>1)fd.t-=1;fd.mesh.visible=true;
    var sl=1/(pathPts.length-1),seg=Math.min(Math.floor(fd.t/sl),pathPts.length-2),lc=(fd.t-seg*sl)/sl;
    var a=pathPts[seg],b=pathPts[seg+1];
    fd.mesh.position.set(a.x+(b.x-a.x)*lc,a.y+(b.y-a.y)*lc+Math.sin(fd.t*Math.PI*4)*.06,a.z+(b.z-a.z)*lc);
  }
}

/* ═══════ HTML HELPERS ═══════ */
var cardsEl=document.getElementById('cards');
function addCard(id,side,top,html,opts){
  opts=opts||{};
  var el=document.getElementById(id);
  if(!el){el=document.createElement('div');el.id=id;el.className='card-'+side+(opts.click?' clickable':'');cardsEl.appendChild(el)}
  el.innerHTML=html;el.style.top=top;
  if(opts.border)el.style.borderColor=opts.border;
  if(opts.w){el.style.width=opts.w;el.style.maxWidth=opts.w}
  if(opts.click)el.onclick=function(){el.classList.toggle('expanded')};
  requestAnimationFrame(function(){el.classList.add('visible')});
}
function clearCards(){cardsEl.innerHTML=''}
function setTitle(h,p){var b=document.getElementById('title-block');b.querySelector('h1').innerHTML=h;b.querySelector('p').innerHTML=p||'';b.classList.add('visible')}
function hideTitle(){document.getElementById('title-block').classList.remove('visible')}

/* ═══════ STATE ═══════ */
var SCENES=6,cur=0,autoPlay=false,autoTimer=null;
var groups=[],enters=[],exits=[],ticks=[];var clock=new THREE.Clock();

var ground=bx(200,.1,200,new THREE.MeshStandardMaterial({color:0x080810,roughness:.75,metalness:.4}));
ground.position.y=-.05;ground.receiveShadow=true;scene.add(ground);
var grid=new THREE.GridHelper(200,200,0x12121E,0x0C0C16);grid.material.transparent=true;grid.material.opacity=.25;scene.add(grid);

/* ═══════ BUILDERS ═══════ */
function buildHospital(){
  var g=new THREE.Group();
  g.add(bx(10,14,8,matWall).translateY(7));
  g.add(bx(6,8,8,matWallL).translateX(-8).translateY(4));
  g.add(bx(6,8,8,matWallL).translateX(8).translateY(4));
  g.add(bx(6,2.2,5,matRoof).translateY(15.1));

    cNodes.forEach(function(n){n.scale.set(.01,.01,.01)});
    chainDots.forEach(function(cd){cd.dots.forEach(function(d){d.mesh.visible=false;d.t=Math.random()})});
  });
})();

/* ═══════ SCENE 6 — "What Questions Do You Have?" ═══════ */
(function(){
  var g=new THREE.Group();g.visible=false;scene.add(g);groups.push(g);

  var agents=[
    {color:P.iq,     label:'Data Agent',    sub:'Finds it',       x:-6},
    {color:P.foundry,label:'Foundry Agent',  sub:'Knows what to do',x:0},
    {color:P.rti,    label:'Ops Agent',      sub:'Makes it happen', x:6},
  ];
  var aNodes=[];
  agents.forEach(function(a){
    var n=glow(.7,a.color,.8);n.position.set(a.x,3,0);n.scale.set(.01,.01,.01);g.add(n);aNodes.push(n);
    g.add(txt(a.label,{size:18,weight:'800',color:'#'+new THREE.Color(a.color).getHexString(),scale:.5}).translateX(a.x).translateY(5));
    g.add(txt(a.sub,{size:13,weight:'400',color:'#555570',scale:.35}).translateX(a.x).translateY(1.5));
    var ring=orbitRing(1.3,a.color);ring.position.set(a.x,3,0);ring.rotation.x=-Math.PI/2;g.add(ring);
  });
  for(var i=0;i<2;i++){
    g.add(lnPts([new THREE.Vector3(agents[i].x+1.5,3,0),new THREE.Vector3(agents[i+1].x-1.5,3,0)],0x333350,.2));
  }
  var chainDots=[];
  for(var ci=0;ci<2;ci++){
    chainDots.push({dots:createStreamDots(g,3,agents[ci+1].color,1),path:[new THREE.Vector3(agents[ci].x+1.5,3,0),new THREE.Vector3(agents[ci+1].x-1.5,3,0)]});
  }

  var pts=particles(100,20,0x151520,.025);g.add(pts);

  ticks.push(function(dt,t){
    tickP(pts);
    aNodes.forEach(function(n,i){n.position.y=3+Math.sin(t*.3+i*1.2)*.08;n.rotation.y+=.002});
    chainDots.forEach(function(cd){animStream(cd.dots,cd.path,dt)});
  });

  enters.push(function(){
    setTitle('Multiply This By <span class="hl-success">Every Patient</span>','That\'s the demo. What questions do you have?');
    gsap.to(cam.position,{x:0,y:4,z:16,duration:2,ease:'power2.inOut'});
    gsap.to(ctrl.target,{x:0,y:3,z:0,duration:2,ease:'power2.inOut'});
    bloom.strength=.25;
    aNodes.forEach(function(n,i){gsap.to(n.scale,{x:1,y:1,z:1,duration:.6,delay:.5+i*.25,ease:'elastic.out(1,.6)'})});

    setTimeout(function(){
      addCard('c6a','center','auto',
        '<p style="font-size:1.05rem;font-weight:800;line-height:1.5">'+
        '<span style="color:var(--iq)">Data Agent</span> finds it.<br>'+
        '<span style="color:var(--foundry)">Foundry Agent</span> knows what to do.<br>'+
        '<span style="color:var(--rti)">Ops Agent</span> makes it happen.<br><br>'+
        '<span style="color:var(--success);font-size:1.2rem">What questions do you have?</span></p>'
      ,{border:'rgba(255,255,255,.06)'});
      setTimeout(function(){var el=document.getElementById('c6a');if(el){el.style.top='auto';el.style.bottom='100px'}},50);
    },1800);

    setTimeout(function(){addCard('c6b','left','200px',
      '<h3 style="color:var(--muted)">If They Ask For More</h3>'+
      '<p style="font-size:.66rem;line-height:2;color:var(--muted)">'+
      '<b style="color:var(--iq)">"More like Sarah?"</b><br>'+
      '<span style="color:#555570">&rarr; "Show me 5 patients on both an opioid and a benzo prescribed by different providers."</span><br><br>'+
      '<b style="color:var(--iq)">"What about kids?"</b><br>'+
      '<span style="color:#555570">&rarr; "Show me a pediatric patient with prescriptions from 3+ different providers."</span><br><br>'+
      '<b style="color:var(--iq)">"Can we see the pharmacy pattern?"</b><br>'+
      '<span style="color:#555570">&rarr; "For Sarah Johnson, show prescription fill dates and pharmacy types."</span></p>'
    ,{border:'rgba(255,255,255,.04)'})},3000);
  });

  exits.push(function(){clearCards();hideTitle();
    aNodes.forEach(function(n){n.scale.set(.01,.01,.01)});
    chainDots.forEach(function(cd){cd.dots.forEach(function(d){d.mesh.visible=false;d.t=Math.random()})});
  });
})();

/* ═══════ NAVIGATION ═══════ */
function go(i){
  if(i<0||i>=SCENES||i===cur)return;
  groups[cur].visible=false;if(exits[cur])exits[cur]();
  cur=i;groups[cur].visible=true;if(enters[cur])enters[cur]();
  document.querySelectorAll('.dot').forEach(function(d,j){d.classList.toggle('active',j===cur)});
  document.getElementById('scene-lbl').textContent=(cur+1)+' / '+SCENES;
  if(autoPlay){clearTimeout(autoTimer);autoTimer=setTimeout(function(){go(cur+1)},16000)}
}
var next=function(){go(cur+1)},prev=function(){go(cur-1)};
var navEl=document.getElementById('nav');
for(var ni=0;ni<SCENES;ni++){(function(idx){
  var d=document.createElement('div');d.className='dot'+(idx===0?' active':'');
  d.addEventListener('click',function(){go(idx)});navEl.appendChild(d);
})(ni)}
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next()}
  else if(e.key==='ArrowLeft')prev();
  else if(e.key==='a'||e.key==='A')toggleAuto();
  else if(e.key>='1'&&e.key<='6')go(+e.key-1);
});
R.domElement.addEventListener('click',function(e){if(e.target===R.domElement)next()});
var btnAuto=document.getElementById('btn-auto');
function toggleAuto(){autoPlay=!autoPlay;btnAuto.classList.toggle('on',autoPlay);btnAuto.textContent=autoPlay?'Auto: ON':'Auto';
  if(autoPlay)autoTimer=setTimeout(function(){go(cur+1)},16000);else clearTimeout(autoTimer)}
btnAuto.addEventListener('click',toggleAuto);
window.addEventListener('resize',function(){var w=innerWidth,h=innerHeight;cam.aspect=w/h;cam.updateProjectionMatrix();R.setSize(w,h);comp.setSize(w,h)});

/* ═══════ RENDER ═══════ */
function animate(){requestAnimationFrame(animate);var dt=clock.getDelta(),t=clock.getElapsedTime();ctrl.update();if(ticks[cur])ticks[cur](dt,t);comp.render()}
var bf=document.getElementById('bar-fill');var pct=0;
var li=setInterval(function(){pct+=7+Math.random()*13;if(pct>=100){pct=100;clearInterval(li);
  setTimeout(function(){document.getElementById('loader').classList.add('done');groups[0].visible=true;if(enters[0])enters[0]();document.getElementById('scene-lbl').textContent='1 / '+SCENES},500)}
  bf.style.width=pct+'%'},110);
animate();

} catch(e) {
  var d=document.getElementById('loader');
  if(d){d.innerHTML='<div style="color:#FF4444;padding:40px;text-align:left;max-width:700px;font-family:monospace;font-size:13px"><h2 style="color:#FF4444;margin-bottom:12px">Init Error</h2><p>'+e.message+'</p><pre style="color:#AA8800;margin-top:12px;font-size:11px;white-space:pre-wrap;max-height:400px;overflow:auto">'+(e.stack||'')+'</pre></div>';d.style.display='flex'}
}
</script>
